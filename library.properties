name=WiFi-Watchdog
version=1.0.0
author=Costin Bobes
maintainer=Costin Bobes
sentence=Non-blocking WiFi connection manager with ICMP ping watchdog for ESP8266 and ESP32.
paragraph=Establishes and maintains client WiFi connectivity via built-in status checks and non-blocking ICMP echo (ping) to the gateway using lwip raw API. Automatically reconnects with an escalating strategy (soft reconnect → full reset). Features: status-change callbacks, DHCP/static IP, hostname, configurable ping interval/timeout, runtime debug logging, and ESP32 multi-core safety.
category=Communication
