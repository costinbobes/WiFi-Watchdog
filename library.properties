sentence=Non-blocking WiFi connection manager with ICMP ping watchdog for ESP8266 and ESP32.
paragraph=Monitors WiFi connectivity via the built-in status API and a non-blocking ICMP echo (ping) to the gateway or a custom target using the lwip raw API. Automatically reconnects with an escalating strategy (soft reconnect then full reset). Supports status-change callbacks, DHCP/static IP, hostname, custom WiFi mode, configurable ping interval/timeout, runtime debug logging, and ESP32 multi-core safety.
